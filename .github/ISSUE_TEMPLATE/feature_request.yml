name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? API shape, CLI flags, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short.
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - SDK
        - Both
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
