name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: arc-tsarr
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Generate API clients and types
        run: bun run generate && bun run generate:types
        
      - name: Run TypeScript check
        run: bun run typecheck
        
      - name: Run linter
        run: bun run lint
        
      - name: Build project
        run: bun run build:js && bun run build:types

  nix-flake:
    runs-on: arc-tsarr

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Nix flake
        run: |
          docker run --rm \
            -v "$PWD/packaging/nix:/work" \
            -w /work \
            nixos/nix:2.24.14 \
            sh -lc 'nix build .#default --extra-experimental-features "nix-command flakes"'
