name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: arc-tsarr
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Generate API clients and types
        run: bun run generate && bun run generate:types
        
      - name: Run TypeScript check
        run: bun run typecheck
        
      - name: Run linter
        run: bun run lint
        
      - name: Run tests
        run: bun test
        
      - name: Build project
        run: bun run build:js && bun run build:cli && bun run build:types

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist/binaries
          bun build src/cli/index.ts --compile --target=bun-linux-x64 --outfile dist/binaries/tsarr-linux-x64
          bun build src/cli/index.ts --compile --target=bun-linux-arm64 --outfile dist/binaries/tsarr-linux-arm64
          bun build src/cli/index.ts --compile --target=bun-darwin-x64 --outfile dist/binaries/tsarr-darwin-x64
          bun build src/cli/index.ts --compile --target=bun-darwin-arm64 --outfile dist/binaries/tsarr-darwin-arm64
          bun build src/cli/index.ts --compile --target=bun-windows-x64 --outfile dist/binaries/tsarr-windows-x64.exe

      - name: Update packaging manifests
        run: bun run scripts/update-packaging.ts $(node -p 'require("./package.json").version')

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          registry-url: 'https://registry.npmjs.org'
        
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx semantic-release

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/robbeverhelst/homebrew-tsarr.git /tmp/homebrew-tap
          cp packaging/homebrew/tsarr.rb /tmp/homebrew-tap/Formula/tsarr.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tsarr.rb
          git commit -m "Update tsarr to $(node -p 'require("/tmp/homebrew-tap/../package.json").version' 2>/dev/null || echo 'latest')" || true
          git push

  docker:
    runs-on: arc-tsarr
    needs: release
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and build
        run: bun run generate && bun run generate:types && bun run build:js && bun run build:cli && bun run build:types

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64